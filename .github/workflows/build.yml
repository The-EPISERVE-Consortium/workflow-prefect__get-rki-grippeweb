name: Build and Test

on:
  push:
    branches:
      - main

env:
  # REPLACE: set OWNER and REPO to your GitHub username / organisation and repo name,
  # or remove this block and rely solely on the dynamic values derived below.
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # REPLACE: swap <OWNER>/<REPO> with your actual GitHub owner and repo,
          # or leave as-is — docker/metadata-action resolves them from github.repository.
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run unit tests inside the built image
        run: |
          docker run --rm \
            --workdir /app \
            ${{ env.REGISTRY }}/${{ github.repository }}:latest \
            python -m pytest tests/ -v
